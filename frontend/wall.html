<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Zeď – StudentBook</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>StudentBook</h1>
  <nav>
    <a href="wall.html" class="auth-only">Zeď</a>
    <a href="users.html" class="auth-only">Uživatelé</a>
    <button id="logoutBtn" class="auth-only">Odhlásit</button>
  </nav>
</header>

<main>

  <div class="card">
    <h2 style="margin-bottom:10px;">Nový příspěvek</h2>

    <form id="newPostForm">
      <label>Nadpis</label>
      <input type="text" id="postTitle" required>

      <label>Text</label>
      <textarea id="postText" required></textarea>

      <label>Obrázek (volitelné)</label>
      <input type="file" id="postImage" accept="image/*">

      <button type="submit" style="margin-top:10px;">Přidat příspěvek</button>
    </form>
  </div>

  <div id="postsContainer"></div>

</main>

<script src="js/common.js"></script>
<script src="js/posts.js"></script>
<script>
  requireAuth();
  setupMenu();
</script>

</body>
</html>
