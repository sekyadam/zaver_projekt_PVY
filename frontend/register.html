<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Registrace – StudentBook</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>StudentBook</h1>
  <nav>
    <a href="login.html" class="guest-only">Přihlášení</a>
    <a href="register.html" class="guest-only">Registrace</a>
    <a href="wall.html" class="auth-only">Zeď</a>
    <a href="users.html" class="auth-only">Uživatelé</a>
    <button id="logoutBtn" class="auth-only">Odhlásit</button>
  </nav>
</header>

<main>
  <div class="card">
    <h2>Registrace</h2>
    <form id="registerForm">
      <div>
        <label>Jméno</label>
        <input type="text" id="firstName" required>
      </div>
      <div>
        <label>Příjmení</label>
        <input type="text" id="lastName" required>
      </div>
      <div>
        <label>Věk</label>
        <input type="number" id="age" required min="1">
      </div>
      <div>
        <label>Pohlaví</label>
        <select id="gender" required>
          <option value="">Vyber...</option>
          <option value="M">Muž</option>
          <option value="F">Žena</option>
          <option value="O">Jiné</option>
        </select>
      </div>
      <div>
        <label>Přihlašovací jméno</label>
        <input type="text" id="username" required>
      </div>
      <div>
        <label>Heslo</label>
        <input type="password" id="password" required>
      </div>
      <div>
        <label>Fotografie</label>
        <input type="file" id="photo" accept="image/*">
      </div>
      <button type="submit">Registrovat</button>
    </form>
    <p id="registerError" style="color:#b91c1c;margin-top:8px;font-size:13px;"></p>
  </div>
</main>

<script src="js/common.js"></script>
<script src="js/auth.js"></script>
<script>
  setupMenu();
</script>
</body>
</html>
